[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# ---------------------------------------------------------------------------
# MinIO object storage
# ---------------------------------------------------------------------------
[program:minio]
command=minio server /data --console-address :9001
environment=MINIO_ROOT_USER="%(ENV_MINIO_ROOT_USER)s",MINIO_ROOT_PASSWORD="%(ENV_MINIO_ROOT_PASSWORD)s"
stdout_logfile=/var/log/supervisor/minio.log
stderr_logfile=/var/log/supervisor/minio.log
autostart=true
autorestart=true
priority=10

# ---------------------------------------------------------------------------
# ChromaDB vector store (uvicorn ASGI)
# ---------------------------------------------------------------------------
[program:chromadb]
command=uvicorn server:app --host 0.0.0.0 --port 8000 --log-level info
directory=/chroma
environment=IS_PERSISTENT="1",PERSIST_DIRECTORY="/chroma/chroma",ALLOW_RESET="false",ANONYMIZED_TELEMETRY="false"
stdout_logfile=/var/log/supervisor/chromadb.log
stderr_logfile=/var/log/supervisor/chromadb.log
autostart=true
autorestart=true
priority=10

# ---------------------------------------------------------------------------
# MinIO bucket initialization (one-shot, exits after success)
# ---------------------------------------------------------------------------
[program:minio-init]
command=/minio_init.sh
stdout_logfile=/var/log/supervisor/minio-init.log
stderr_logfile=/var/log/supervisor/minio-init.log
autostart=true
autorestart=false
startsecs=0
startretries=5
priority=20
