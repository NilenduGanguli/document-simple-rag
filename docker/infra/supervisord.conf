[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# ---------------------------------------------------------------------------
# PostgreSQL 16
# ---------------------------------------------------------------------------
[program:postgres]
command=gosu postgres /usr/lib/postgresql/16/bin/postgres -D /var/lib/postgresql/data
stdout_logfile=/var/log/supervisor/postgres.log
stderr_logfile=/var/log/supervisor/postgres.log
autostart=true
autorestart=true
priority=10
stopwaitsecs=60

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
[program:redis]
command=redis-server /etc/redis/redis.conf --dir /var/lib/redis
stdout_logfile=/var/log/supervisor/redis.log
stderr_logfile=/var/log/supervisor/redis.log
autostart=true
autorestart=true
priority=10
user=redis

# ---------------------------------------------------------------------------
# RabbitMQ
# ---------------------------------------------------------------------------
[program:rabbitmq]
command=gosu rabbitmq /usr/sbin/rabbitmq-server
stdout_logfile=/var/log/supervisor/rabbitmq.log
stderr_logfile=/var/log/supervisor/rabbitmq.log
autostart=true
autorestart=true
priority=10
environment=HOME="/var/lib/rabbitmq",RABBITMQ_USE_LONGNAME="false"
stopwaitsecs=30
