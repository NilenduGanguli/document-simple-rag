server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so nginx re-resolves upstream hostnames
    # at request time instead of caching IPs at startup (avoids 502 after restarts).
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Reverse proxy to ingest-api
    # rewrite strips /api/ingest/ prefix and replaces with /api/v1/
    # proxy_pass variable (no path) passes the rewritten $uri to the backend.
    location /api/ingest/ {
        set $upstream_ingest http://ingest-api:8000;
        rewrite ^/api/ingest/(.*)$ /api/v1/$1 break;
        proxy_pass $upstream_ingest;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 500m;
    }

    # Reverse proxy to retrieval-api
    location /api/retrieval/ {
        set $upstream_retrieval http://retrieval-api:8001;
        rewrite ^/api/retrieval/(.*)$ /api/v1/$1 break;
        proxy_pass $upstream_retrieval;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
