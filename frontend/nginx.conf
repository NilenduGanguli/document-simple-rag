server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so nginx re-resolves upstream hostnames
    # at request time instead of caching IPs at startup (avoids 502 after restarts).
    resolver 127.0.0.11 valid=5s ipv6=off;

    # All API routes proxy to the unified backend service.
    # rewrite strips the /api/<prefix>/ namespace and rewrites to /api/v1/

    location /api/ingest/ {
        set $upstream_backend http://backend:8000;
        rewrite ^/api/ingest/(.*)$ /api/v1/$1 break;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 500m;
    }

    location /api/retrieval/ {
        set $upstream_backend http://backend:8000;
        rewrite ^/api/retrieval/(.*)$ /api/v1/$1 break;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/auth/ {
        set $upstream_backend http://backend:8000;
        rewrite ^/api/auth/(.*)$ /api/v1/auth/$1 break;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
