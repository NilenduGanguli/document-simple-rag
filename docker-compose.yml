services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword123}
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rag-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://raguser:${POSTGRES_PASSWORD:-ragpassword123}@postgres:5432/ragdb?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rag-network

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-raguser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-ragpassword123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - rag-network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "19000:9000"
      - "19001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rag-network

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /init.sh
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - ./infra/minio/init.sh:/init.sh:ro
    networks:
      - rag-network

  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - rag-network

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "18200:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - rag-network

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - rag-network

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------

  model-init:
    build:
      context: .
      dockerfile: services/model-init/Dockerfile
    restart: "no"
    environment:
      MODEL_DEST: /models
      HF_MODEL_NAME: google-bert/bert-base-uncased
      FORCE_REINIT: ${FORCE_MODEL_REINIT:-false}
      HF_HUB_CACHE: /models/_hf_cache
      TRANSFORMERS_OFFLINE: "0"
      HF_HUB_OFFLINE: "0"
    volumes:
      - models_volume:/models
    networks:
      - rag-network

  ingest-api:
    build:
      context: .
      dockerfile: services/ingest-api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://raguser:${POSTGRES_PASSWORD:-ragpassword123}@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-raguser}:${RABBITMQ_PASS:-ragpassword123}@rabbitmq:5672/
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: rag-documents
      MAX_FILE_SIZE_MB: "500"
      API_KEYS: ${API_KEYS:-dev-api-key-1,dev-api-key-2}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-1000}
      RATE_LIMIT_PER_IP: ${RATE_LIMIT_PER_IP:-50}
      CHROMADB_URL: http://chromadb:8000
      JAEGER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: ingest-api
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rag-network

  ingestion-worker:
    build:
      context: .
      dockerfile: services/ingestion-worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      model-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://raguser:${POSTGRES_PASSWORD:-ragpassword123}@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-raguser}:${RABBITMQ_PASS:-ragpassword123}@rabbitmq:5672/
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: rag-documents
      MAX_FILE_SIZE_MB: "500"
      JAEGER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: ingestion-worker
      WORKER_CONCURRENCY: "6"
      OCR_CONCURRENCY_LIMIT: ${OCR_CONCURRENCY_LIMIT:-3}
      CHUNKING_STRATEGY: ${CHUNKING_STRATEGY:-recursive}
      CHUNK_MAX_TOKENS: ${CHUNK_MAX_TOKENS:-400}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-50}
      TOKENIZERS_PARALLELISM: "false"
      TOKENIZER_MODEL: /models/embedding/int8
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    volumes:
      - models_volume:/models:ro
    networks:
      - rag-network

  ocr-service:
    build:
      context: .
      dockerfile: services/ocr-service/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ocr-api:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-raguser}:${RABBITMQ_PASS:-ragpassword123}@rabbitmq:5672/
      OCR_CONCURRENCY: ${OCR_CONCURRENCY:-3}
      OCR_API_URL: http://ocr-api:8002/ocr
      JAEGER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: ocr-service
    networks:
      - rag-network

  ocr-api:
    build:
      context: ./ocr-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JAEGER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: ocr-api
      METRICS_PORT: "8083"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - rag-network

  embedding-service:
    build:
      context: .
      dockerfile: services/embedding-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://raguser:${POSTGRES_PASSWORD:-ragpassword123}@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-raguser}:${RABBITMQ_PASS:-ragpassword123}@rabbitmq:5672/
      CHROMADB_URL: http://chromadb:8000
      MODEL_DEST: /models
      MODEL_VERSION: local-docker-compose
      ONNX_POOL_SIZE: "2"
      ONNX_THREADS_PER_SESSION: "2"
      EMBEDDING_BATCH_SIZE: "16"
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-bert-base-uncased-int8}
      BATCH_COLLECT_TIMEOUT: ${BATCH_COLLECT_TIMEOUT:-0.1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OMP_NUM_THREADS: "2"
      OMP_WAIT_POLICY: PASSIVE
      MKL_NUM_THREADS: "2"
      GOMP_SPINCOUNT: "0"
      TOKENIZERS_PARALLELISM: "false"
      PREFETCH_QUEUE_SIZE: "4"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      JAEGER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: embedding-service
    volumes:
      - models_volume:/models:ro
    networks:
      - rag-network

  retrieval-api:
    build:
      context: .
      dockerfile: services/retrieval-api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://raguser:${POSTGRES_PASSWORD:-ragpassword123}@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/2
      CHROMADB_URL: http://chromadb:8000
      MODEL_DEST: /models
      MODEL_VERSION: local-docker-compose
      ONNX_POOL_SIZE: "1"
      ONNX_THREADS_PER_SESSION: "2"
      BM25_REFRESH_INTERVAL_SECONDS: "300"
      API_KEYS: ${API_KEYS:-dev-api-key-1,dev-api-key-2}
      JAEGER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: retrieval-api
      TOKENIZERS_PARALLELISM: "false"
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: rag-documents
      S3_EXTERNAL_URL: http://localhost:19000
      MAX_QUERY_TOKENS: ${MAX_QUERY_TOKENS:-100}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-1000}
      RATE_LIMIT_PER_IP: ${RATE_LIMIT_PER_IP:-500}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      ENVIRONMENT: ${ENVIRONMENT:-DEV}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}
    volumes:
      - models_volume:/models:ro
    ports:
      - "18001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend-compiled
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
      retrieval-api:
        condition: service_healthy
    ports:
      - "3001:80"
    networks:
      - rag-network

# -----------------------------------------------------------------------------
# Named Volumes
# -----------------------------------------------------------------------------

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  chromadb_data:
  prometheus_data:
  grafana_data:
  models_volume:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------

networks:
  rag-network:
    driver: bridge
