global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ingest-api'
    static_configs:
      - targets: ['ingest-api:8000']
    metrics_path: /metrics

  - job_name: 'embedding-service'
    static_configs:
      - targets: ['embedding-service:8080']
    metrics_path: /metrics

  - job_name: 'retrieval-api'
    static_configs:
      - targets: ['retrieval-api:8001']
    metrics_path: /metrics

  - job_name: 'ingestion-worker'
    static_configs:
      - targets: ['ingestion-worker:8081']
    metrics_path: /metrics

  - job_name: 'ocr-service'
    static_configs:
      - targets: ['ocr-service:8082']
    metrics_path: /metrics

  - job_name: 'ocr-api'
    static_configs:
      - targets: ['ocr-api:8083']
    metrics_path: /metrics

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    metrics_path: /metrics
